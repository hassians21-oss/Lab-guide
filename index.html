<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; padding-bottom: 120px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #3498db; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; transition: 0.3s; }
        .search-box:focus { border-color: #2980b9; outline: none; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 5px solid #3498db; position: relative; transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .card.selected { border-right-color: #27ae60; background-color: #f0fdf4; border: 2px solid #27ae60; }
        .card h3 { margin: 0 0 10px 0; color: #2980b9; direction: ltr; text-align: left; padding-right: 40px; font-size: 18px; line-height: 1.3; }
        .card.selected h3 { color: #27ae60; }
        .detail-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-title { font-weight: bold; color: #34495e; }
        .detail-value { color: #555; direction: ltr; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        .available { background-color: #e8f8f5; color: #1abc9c; border: 1px solid #1abc9c; }
        .unavailable { background-color: #fdedec; color: #e74c3c; border: 1px solid #e74c3c; }
        .sample-type { font-weight: bold; color: #d35400; }
        .price-tag { font-weight: bold; color: #27ae60; font-size: 16px; }
        .checkbox-container { position: absolute; top: 15px; right: 15px; pointer-events: none; }
        .checkbox-container input { width: 22px; height: 22px; accent-color: #27ae60; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2c3e50; color: white; padding: 15px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; z-index: 1000; transition: transform 0.3s ease; border-top-left-radius: 15px; border-top-right-radius: 15px; }
        .cart-bar.hidden { transform: translateY(100%); }
        .cart-info { display: flex; flex-direction: column; }
        .cart-total { font-size: 20px; font-weight: bold; color: #f1c40f; }
        .cart-count { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .btn-view { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 12px; padding: 20px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; color: #2c3e50; }
        .close-btn { font-size: 28px; cursor: pointer; color: #e74c3c; background: none; border: none; line-height: 1; }
        .selected-list-container { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; }
        .selected-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .selected-name { direction: ltr; font-weight: bold; color: #34495e; text-align: left; flex: 1; font-size: 15px; }
        .selected-price { color: #27ae60; font-weight: bold; margin: 0 10px; white-space: nowrap; }
        .remove-btn { color: #e74c3c; cursor: pointer; font-size: 20px; padding: 0 5px; }
        .empty-cart-msg { text-align: center; color: #7f8c8d; padding: 20px; }
        .modal-footer { border-top: 2px solid #eee; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .modal-total-label { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .modal-total-value { font-size: 22px; font-weight: bold; color: #e67e22; }
    </style>
</head>
